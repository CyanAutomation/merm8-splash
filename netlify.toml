[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "24"
  # Override NEXT_PUBLIC_MERM8_API_URL in Netlify's dashboard for staging/preview environments
  NEXT_PUBLIC_MERM8_API_URL = "https://api.merm8.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
